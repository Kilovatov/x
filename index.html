<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Multiplication Practice</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: clamp(12px, 3vw, 24px);
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      overflow-x: hidden;
    }

    .app {
      width: 100%;
      max-width: min(560px, 100%);
      background: white;
      border-radius: clamp(16px, 3vw, 24px);
      padding: clamp(16px, 4vw, 28px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.2);
    }

    h1 {
      margin: 0 0 24px;
      text-align: center;
      font-size: 2.3rem;
      word-break: break-word;
      color: #111827;
    }

    .settings {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 24px;
    }

    .settings label {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
    }

    select,
    input,
    button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      padding: 12px;
      font-size: 16px;
    }

    button {
      border: none;
      background: #4f46e5;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #4338ca;
    }

    .tables {
      margin-bottom: 28px;
    }

    .tables h3 {
      margin-bottom: 12px;
      color: #111827;
    }

    .table-buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
      gap: 10px;
    }

    .table-buttons button {
      background: #e5e7eb;
      color: #111827;
      font-weight: bold;
    }

    .table-buttons button.active {
      background: #10b981;
      color: white;
    }

    .question-box {
      text-align: center;
      margin-bottom: 24px;
    }

    .timer {
      font-size: 22px;
      font-weight: bold;
      color: #ef4444;
      margin-bottom: 14px;
    }

    .question {
      font-size: clamp(42px, 8vw, 64px);
      font-weight: bold;
      margin-bottom: 22px;
      overflow-wrap: break-word;
      color: #111827;
    }

    .answer-input {
      width: 140px;
      text-align: center;
      font-size: 30px;
    }

    .feedback {
      min-height: 34px;
      margin-top: 14px;
      font-size: 20px;
      font-weight: bold;
    }

    .correct {
      color: #16a34a;
    }

    .wrong {
      color: #dc2626;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 20px;
      background: #f3f4f6;
      padding: 16px;
      border-radius: 14px;
      font-weight: bold;
      flex-wrap: wrap;
    }

    .footer {
      text-align: center;
      margin-top: 22px;
      color: #6b7280;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      body {
        align-items: flex-start;
      }

      .settings {
        grid-template-columns: 1fr;
      }

      .stats {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>✖ Multiplication Practice</h1>

    <div class="settings">
      <label>
        Max Number
        <select id="maxNumber">
          <option value="5">5</option>
          <option value="10">10</option>
          <option value="12" selected>12</option>
        </select>
      </label>

      <label>
        Mode
        <select id="mode">
          <option value="random">Random</option>
          <option value="selected">Selected Tables</option>
        </select>
      </label>

      <label>
        Time Limit (seconds)
        <input
          type="number"
          id="timeLimit"
          min="3"
          max="60"
          value="10"
        />
      </label>
    </div>

    <div class="tables">
      <h3>Select Tables</h3>
      <div class="table-buttons" id="tableButtons"></div>
    </div>

    <div class="question-box">
      <div class="timer" id="timer">⏳ 10s</div>

      <div class="question" id="question">3 × 4</div>

      <input
        type="number"
        id="answer"
        class="answer-input"
        placeholder="?"
        autocomplete="off"
        inputmode="numeric"
        pattern="[0-9]*"
      />

      <div class="feedback" id="feedback"></div>
    </div>

    <button id="submitBtn">Check Answer</button>

    <div class="stats">
      <div>✅ Correct: <span id="correctCount">0</span></div>
      <div>❌ Wrong: <span id="wrongCount">0</span></div>
    </div>

    <div class="footer">
      Practice multiplication tables up to 12
    </div>
  </div>

  <script>
    const questionEl = document.getElementById("question");
    const answerEl = document.getElementById("answer");
    const feedbackEl = document.getElementById("feedback");
    const correctCountEl = document.getElementById("correctCount");
    const wrongCountEl = document.getElementById("wrongCount");
    const maxNumberEl = document.getElementById("maxNumber");
    const modeEl = document.getElementById("mode");
    const tableButtonsEl = document.getElementById("tableButtons");

    const timerEl = document.getElementById("timer");
    const timeLimitEl = document.getElementById("timeLimit");

    let currentA = 1;
    let currentB = 1;
    let correctCount = 0;
    let wrongCount = 0;

    let timer;
    let timeLeft = 10;

    const selectedTables = new Set([2, 3, 4, 5]);

    function createTableButtons() {
      tableButtonsEl.innerHTML = "";

      for (let i = 1; i <= 12; i++) {
        const btn = document.createElement("button");
        btn.textContent = i;

        if (selectedTables.has(i)) {
          btn.classList.add("active");
        }

        btn.addEventListener("click", () => {
          if (selectedTables.has(i)) {
            selectedTables.delete(i);
            btn.classList.remove("active");
          } else {
            selectedTables.add(i);
            btn.classList.add("active");
          }

          if (selectedTables.size === 0) {
            selectedTables.add(i);
            btn.classList.add("active");
          }

          generateQuestion();
        });

        tableButtonsEl.appendChild(btn);
      }
    }

    function randomInt(max) {
      return Math.floor(Math.random() * max) + 1;
    }

    function startTimer() {
      clearInterval(timer);

      timeLeft = parseInt(timeLimitEl.value);
      timerEl.textContent = `⏳ ${timeLeft}s`;

      timer = setInterval(() => {
        timeLeft--;

        timerEl.textContent = `⏳ ${timeLeft}s`;

        if (timeLeft <= 0) {
          clearInterval(timer);

          wrongCount++;
          wrongCountEl.textContent = wrongCount;

          feedbackEl.textContent =
            `⏰ Time's up! Answer: ${currentA * currentB}`;

          feedbackEl.className = "feedback wrong";

          setTimeout(generateQuestion, 1200);
        }
      }, 1000);
    }

    function generateQuestion() {
      const max = parseInt(maxNumberEl.value);

      if (modeEl.value === "selected") {
        const tables = Array.from(selectedTables);
        currentA = tables[Math.floor(Math.random() * tables.length)];
      } else {
        currentA = randomInt(max);
      }

      currentB = randomInt(max);

      questionEl.textContent = `${currentA} × ${currentB}`;

      answerEl.value = "";

      feedbackEl.textContent = "";
      feedbackEl.className = "feedback";

      // Keep focus on the input without dismissing the keyboard on iPad.
      // Selecting the empty value re-activates the cursor without a blur/focus cycle.
      if (document.activeElement !== answerEl) {
        answerEl.focus({ preventScroll: true });
      } else {
        answerEl.select();
      }

      startTimer();
    }

    function checkAnswer() {
      const userAnswer = parseInt(answerEl.value);

      if (isNaN(userAnswer)) return;

      const correctAnswer = currentA * currentB;

      clearInterval(timer);

      if (userAnswer === correctAnswer) {
        correctCount++;
        correctCountEl.textContent = correctCount;

        feedbackEl.textContent = "Correct! 🎉";
        feedbackEl.className = "feedback correct";

        setTimeout(generateQuestion, 700);
      } else {
        wrongCount++;
        wrongCountEl.textContent = wrongCount;

        feedbackEl.textContent =
          `Wrong — Answer: ${correctAnswer}`;

        feedbackEl.className = "feedback wrong";

        setTimeout(generateQuestion, 1200);
      }
    }

    document
      .getElementById("submitBtn")
      .addEventListener("click", checkAnswer);

    answerEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        checkAnswer();
      }
    });

    answerEl.addEventListener("input", () => {
      const userAnswer = parseInt(answerEl.value);
      if (isNaN(userAnswer)) return;

      const correctAnswer = currentA * currentB;

      // Auto-accept as soon as the typed number equals the correct answer
      // and has the same number of digits (prevents accepting e.g. "6" when answer is "60")
      if (
        userAnswer === correctAnswer &&
        answerEl.value.length === String(correctAnswer).length
      ) {
        checkAnswer();
      }
    });

    maxNumberEl.addEventListener("change", generateQuestion);
    modeEl.addEventListener("change", generateQuestion);

    timeLimitEl.addEventListener("change", () => {
      generateQuestion();
    });

    createTableButtons();
    generateQuestion();
  </script>
</body>
</html>
